<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парк БпЛА | Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            padding: 15px;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }

        .status-active {
            border-left: 4px solid #22c55e;
        }

        .status-repair {
            border-left: 4px solid #eab308;
            opacity: 0.8;
        }

        .status-broken {
            border-left: 4px solid #ef4444;
            opacity: 0.6;
        }

        .status-season {
            border-left: 4px solid #3b82f6;
            opacity: 0.9;
        }

        /* Новий колір для сезонного ТО (синій) */
        /* ── Labels ── */
        .label-style {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            display: flex;
            align-items: flex-end;
            min-height: 24px;
            letter-spacing: 0.06em;
            line-height: 1.2;
        }

        select,
        input {
            background: #0f172a !important;
            color: white !important;
            border: 1px solid #334155 !important;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
            padding: 8px 12px !important;
            width: 100%;
        }

        select:focus,
        input:focus {
            border-color: #22c55e !important;
        }
    </style>
</head>

<body class="max-w-3xl mx-auto">

    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <button onclick="goBack()"
                class="bg-slate-800 p-3 rounded-xl text-slate-400 hover:text-white transition-all border border-slate-700">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter text-blue-500 italic">Парк БпЛА</h1>
                <p id="currentUnitDisplay" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest"></p>
            </div>
        </div>
        <button onclick="addNewDrone()"
            class="bg-blue-600 hover:bg-blue-500 text-xs font-black uppercase px-6 py-3 rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">
            <i class="fa-solid fa-plus mr-2"></i>Додати борт
        </button>
    </div>

    <div class="mb-6">
        <h2 class="text-xs font-black uppercase text-green-500 mb-3 ml-1 flex items-center">
            <i class="fa-solid fa-circle-check mr-2"></i>В строю
        </h2>
        <div id="activeFleetList" class="space-y-3">
            <div class="text-center py-4 text-slate-600 text-xs">Завантаження...</div>
        </div>
    </div>

    <div class="mb-10">
        <h2 class="text-xs font-black uppercase text-slate-500 mb-3 ml-1 flex items-center">
            <i class="fa-solid fa-screwdriver-wrench mr-2"></i>Обслуговування / Списані
        </h2>
        <div id="inactiveFleetList" class="space-y-3 opacity-80"></div>
    </div>

    <script>
        function getTargetUnit() {
            const queryString = window.location.search.substring(1);
            if (!queryString) return localStorage.getItem('uav_unit');

            const params = queryString.split('&');
            for (let param of params) {
                let [key, value] = param.split('=');
                if (key === 'unit' && value) {
                    return decodeURIComponent(decodeURIComponent(value)).trim();
                }
            }
            return localStorage.getItem('uav_unit');
        }

        const currentUnit = getTargetUnit();
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        let dronesCache = [];

        // Розумна кнопка "Назад"
        function goBack() {
            if (token) {
                // Якщо є токен — повертаємо в адмін-панель з цим же токеном
                window.location.href = `/admin?token=${token}`;
            } else {
                // Якщо немає — на головну
                window.location.href = '/';
            }
        }

        async function loadFleet() {
            if (!currentUnit) {
                document.body.innerHTML = `<div class="flex h-screen items-center justify-center text-slate-500">Підрозділ не визначено</div>`;
                return;
            }
            document.getElementById('currentUnitDisplay').textContent = currentUnit;

            try {
                const res = await fetch(`/api/get_unit_drones?unit=${encodeURIComponent(currentUnit)}`);
                if (!res.ok) throw new Error();
                dronesCache = await res.json();
                renderDrones();
            } catch (err) {
                document.getElementById('activeFleetList').innerHTML = `<div class="text-center text-red-500 text-xs py-10">Не вдалося знайти дані для: ${currentUnit}</div>`;
            }
        }

        function renderDrones() {
            const activeList = document.getElementById('activeFleetList');
            const inactiveList = document.getElementById('inactiveFleetList');
            activeList.innerHTML = '';
            inactiveList.innerHTML = '';

            const activeDrones = dronesCache.filter(d => (!d.status || d.status === 'Active'));
            const inactiveDrones = dronesCache.filter(d => (d.status && d.status !== 'Active'));

            if (activeDrones.length === 0) activeList.innerHTML = `<div class="glass p-4 text-center text-slate-500 text-xs italic">Список порожній</div>`;
            else activeList.innerHTML = activeDrones.map(d => createDroneCard(d)).join('');

            if (inactiveDrones.length === 0) inactiveList.innerHTML = `<div class="p-4 text-center text-slate-700 text-xs border border-dashed border-slate-800 rounded-xl">Порожньо</div>`;
            else inactiveList.innerHTML = inactiveDrones.map(d => createDroneCard(d)).join('');
        }

        function createDroneCard(d) {
            const status = d.status || 'Active';
            let statusClass = 'status-active';
            if (status === 'Repair') statusClass = 'status-repair';
            if (status === 'Broken') statusClass = 'status-broken';
            if (status === 'Season') statusClass = 'status-season';

            const batteryVal = (d.battery_count !== null && d.battery_count !== undefined) ? d.battery_count : '';

            return `
            <div class="glass p-4 ${statusClass} transition-all hover:bg-slate-800/50">
                <div class="flex flex-col gap-4">
                    <div class="min-w-0">
                        <div class="text-sm font-black uppercase text-white tracking-wide">${d.model}</div>
                        <div class="text-[10px] font-mono text-slate-400 mt-1">
                            <span class="bg-slate-800 px-2 py-0.5 rounded text-slate-300 select-all">${d.serial_number || 'S/N: ---'}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-end gap-3 justify-end border-t border-white/5 pt-3">
                        <div class="w-[60px]">
                            <label class="label-style !text-[9px] !mb-1 text-center">АКБ</label>
                            <input
                                id="battery-${d.id}"
                                type="number"
                                min="0"
                                value="${batteryVal}"
                                placeholder="0"
                                onblur="updateBatteryCount(${d.id})"
                                onkeydown="if(event.key==='Enter') this.blur()"
                                class="text-center !text-[12px] !font-bold !py-2 !px-1 rounded-lg"
                            />
                        </div>
                        <div class="w-[140px]">
                            <label class="label-style !text-[9px] !mb-1 text-center">Статус</label>
                            <select onchange="updateStatus(${d.id}, this.value)" class="appearance-none !text-[10px] font-bold !py-2.5 !px-2 rounded-lg truncate">
                                <option value="Active" ${status === 'Active' ? 'selected' : ''}>🟢 В строю</option>
                                <option value="Repair" ${status === 'Repair' ? 'selected' : ''}>🟡 Ремонт</option>
                                <option value="Season" ${status === 'Season' ? 'selected' : ''}>🔵 Сезонне ТО</option>
                                <option value="Broken" ${status === 'Broken' ? 'selected' : ''}>🔴 Пошкоджений</option>
                            </select>
                        </div>
                        <div class="pb-1">
                            <button onclick="deleteDrone(${d.id})" class="text-slate-600 hover:text-red-500 p-2 transition-all active:scale-90" title="Видалити">
                                <i class="fa-solid fa-trash-can text-base"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        async function addNewDrone() {
            const model = prompt("Модель:");
            if (!model) return;
            const sn = prompt("S/N:");
            try {
                const response = await fetch('/api/add_new_drone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: model, serial_number: sn || "—", unit: currentUnit })
                });
                if (response.ok) loadFleet();
            } catch (e) { alert("Помилка!"); }
        }

        async function updateStatus(id, newStatus) {
            try {
                const res = await fetch('/api/update_drone_status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: newStatus })
                });
                if (res.ok) {
                    const drone = dronesCache.find(d => d.id === id);
                    if (drone) drone.status = newStatus;
                    renderDrones();
                }
            } catch (e) { alert("Помилка оновлення"); }
        }

        async function updateBatteryCount(id) {
            const input = document.getElementById(`battery-${id}`);
            const count = parseInt(input.value);
            if (isNaN(count) || count < 0) return;
            try {
                const res = await fetch('/api/update_drone_battery', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, battery_count: count })
                });
                if (res.ok) {
                    const drone = dronesCache.find(d => d.id === id);
                    if (drone) drone.battery_count = count;
                    // Flash border green to confirm
                    input.style.borderColor = '#22c55e';
                    setTimeout(() => input.style.borderColor = '', 1200);
                }
            } catch (e) { alert("Помилка збереження АКБ"); }
        }

        async function deleteDrone(id) {
            if (confirm("Видалити борт?")) {
                try {
                    await fetch(`/api/delete_drone/${id}`, { method: 'DELETE' });
                    loadFleet();
                } catch (e) { alert("Помилка видалення"); }
            }
        }

        loadFleet();
    </script>
</body>

</html>
