<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал польотів | UAV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #060b18;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(34, 197, 94, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(59, 130, 246, 0.07) 0%, transparent 60%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            padding: 12px;
        }

        /* ── Glass Cards ── */
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .mission-card {
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.4);
            transition: transform 0.3s ease;
        }

        .mission-header {
            background: linear-gradient(to right, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
            border-left: 4px solid #22c55e;
            padding: 1.25rem 1.5rem;
            position: relative;
        }

        .flight-row {
            background: rgba(30, 41, 59, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1rem 1.5rem;
            transition: all 0.2s ease;
        }

        .flight-row:hover {
            background: rgba(30, 41, 59, 0.4);
        }

        .flight-row:last-child {
            border-bottom: none;
        }

        .tech-label {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: 800;
            color: #64748b;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
            display: block;
        }

        .btn-report {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.2);
            color: #60a5fa;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-report:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .no-fly-row {
            opacity: 0.5;
            filter: grayscale(0.5);
            background: rgba(15, 23, 42, 0.3);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>

<body class="max-w-4xl mx-auto pb-20">

    <!-- Header Section -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 pt-6 px-2">
        <div class="flex items-center gap-4">
            <button onclick="nav('/')"
                class="w-10 h-10 flex items-center justify-center glass hover:bg-slate-800 transition-all active:scale-95 group rounded-xl">
                <i class="fa-solid fa-house text-slate-400 group-hover:text-white transition-colors"></i>
            </button>
            <div>
                <h1 class="text-2xl font-black uppercase italic text-green-500 tracking-tighter leading-none">Журнал
                    польотів</h1>
                <p
                    class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1.5 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Електронна копія
                </p>
            </div>
        </div>

        <button onclick="exportToExcel()"
            class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl text-[11px] font-black uppercase tracking-wider shadow-lg shadow-blue-500/20 active:scale-95 transition-all text-white flex items-center gap-2">
            <i class="fa-solid fa-file-excel text-sm"></i> Експорт в Excel
        </button>
    </div>

    <!-- Content Container -->
    <div id="logsContainer" class="space-y-8 min-h-[400px]">
        <div class="flex flex-col items-center justify-center py-32 text-slate-600 space-y-4">
            <div class="relative">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-green-500"></i>
                <div class="absolute inset-0 blur-xl bg-green-500/20 animate-pulse"></div>
            </div>
            <div class="text-[10px] uppercase font-black tracking-[0.2em]">Обробка польотних даних...</div>
        </div>
    </div>

    <script src="/libs/db.js"></script>
    <script>
        let allFlights = [];
        const currentOp = localStorage.getItem('uav_op');
        const currentUnit = localStorage.getItem('uav_unit');

        function fmtTime(t) { return t ? t.substring(0, 5) : '--:--'; }

        function nav(path) {
            const token = new URLSearchParams(window.location.search).get('token');
            window.location.href = token ? `${path}?token=${token}` : path;
        }

        async function loadFlights() {
            if (!currentOp || !currentUnit) {
                dbAPI.showNotification("Помилка авторизації!", "error");
                window.location.href = "/";
                return;
            }

            try {
                const res = await fetch("/api/get_all_flights");
                const data = await res.json();
                allFlights = data.filter(f => f.operator === currentOp && f.unit === currentUnit);
                renderLogs(allFlights);
            } catch (e) {
                console.error(e);
                document.getElementById('logsContainer').innerHTML = `
                    <div class="text-center py-20 text-red-500/50">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i>
                        <p class="font-black uppercase text-xs tracking-widest">Помилка завантаження бази даних</p>
                    </div>`;
            }
        }

        function renderLogs(flights) {
            const container = document.getElementById('logsContainer');
            if (flights.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-32 glass rounded-3xl mx-2 border-dashed border-2 border-white/5">
                        <i class="fa-solid fa-ghost text-4xl text-slate-800 mb-4"></i>
                        <div class="text-slate-500 text-[11px] font-black uppercase tracking-widest italic">Записів не знайдено</div>
                    </div>`;
                return;
            }

            const grouped = flights.reduce((acc, flight) => {
                const key = `${flight.date}_${flight.shift_time}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(flight);
                return acc;
            }, {});

            container.innerHTML = Object.values(grouped).map(missionFlights => {
                const first = missionFlights[0];
                const uniqueRoutes = [...new Set(missionFlights.map(f => f.route).filter(r => r && r !== "Не вказано"))];
                const routeDisplay = uniqueRoutes.length > 0 ? uniqueRoutes.join(', ') : "Маршрут не вказано";

                return `
                <div class="mission-card glass mx-2">
                    <div class="mission-header">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div class="flex items-center gap-6">
                                <div>
                                    <span class="tech-label">Дата завдання</span>
                                    <div class="text-lg font-black text-white flex items-center gap-2">
                                        ${first.date?.split('-').reverse().join('.')}
                                        <span class="text-xs text-green-500/50 font-mono tracking-tighter">(${fmtTime(first.shift_time)})</span>
                                    </div>
                                </div>
                                <div class="w-px h-8 bg-white/10 hidden sm:block"></div>
                                <div>
                                    <span class="tech-label">Маршрут / Локація</span>
                                    <div class="text-[11px] font-bold text-slate-400 uppercase max-w-[200px] truncate" title="${routeDisplay}">${routeDisplay}</div>
                                </div>
                            </div>
                            
                            <button onclick="window.location.href='/report?date=${first.date}&unit=${encodeURIComponent(first.unit)}&route=${encodeURIComponent(routeDisplay)}'" 
                                    class="btn-report px-4 py-2 rounded-lg text-[10px] flex items-center gap-2">
                                <i class="fa-solid fa-file-contract text-sm"></i> Донесення
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col">
                        ${missionFlights.map(f => {
                    const isNoFly = f.result === "Польоти не здійснювались";
                    const rowClass = isNoFly ? "no-fly-row" : "";

                    return `
                            <div class="flight-row grid grid-cols-2 sm:flex sm:flex-nowrap justify-between items-start gap-y-4 gap-x-2 ${rowClass}">
                                <div class="col-span-1 sm:w-1/4">
                                    <span class="tech-label">Зліт - Посадка</span>
                                    <div class="text-[13px] font-bold text-white tracking-tight flex items-center gap-2 font-mono">
                                        ${fmtTime(f.takeoff)} 
                                        <i class="fa-solid fa-arrow-right-long text-[10px] text-green-500/40"></i> 
                                        ${fmtTime(f.landing)}
                                    </div>
                                </div>
                                <div class="col-span-1 sm:w-1/4 text-right sm:text-left">
                                    <span class="tech-label">Ресурс АКБ</span>
                                    <div class="text-[12px] font-black text-blue-400 font-mono flex items-baseline gap-1 justify-end sm:justify-start">
                                        ${f.battery_id || '--'} 
                                        <span class="text-[9px] text-orange-500 font-bold">[${f.battery_cycles || 0}]</span>
                                    </div>
                                </div>
                                <div class="col-span-1 sm:w-1/4 text-left">
                                    <span class="tech-label">Тривалість / Дист.</span>
                                    <div class="text-[13px] font-extrabold text-white">
                                        ${isNoFly ? '--' : f.duration + '<span class="text-[10px] text-slate-500 ml-0.5">хв</span>'}
                                        <span class="mx-1.5 text-slate-700">|</span>
                                        ${isNoFly ? '--' : (f.distance || 0) + '<span class="text-[10px] text-slate-500 ml-0.5">м</span>'}
                                    </div>
                                </div>
                                <div class="col-span-1 sm:w-[15%] text-right">
                                    <span class="tech-label">Підсумок</span>
                                    <div class="text-[9px] font-black uppercase tracking-wider py-0.5 px-2 rounded-md inline-block border ${isNoFly ? 'text-slate-500 border-slate-700' : 'text-emerald-400 bg-emerald-400/5 border-emerald-400/20'}">
                                        ${f.result || 'ВИКОНАНО'}
                                    </div>
                                </div>
                            </div>`;
                }).join('')}
                    </div>

                    <div class="px-6 py-3 bg-white/[0.02] flex justify-between items-center text-[10px] font-bold uppercase tracking-tighter">
                        <div class="flex items-center gap-2 text-slate-500 italic">
                            <i class="fa-solid fa-microchip text-[11px]"></i>
                            ${first.drone || "Автономний борт"}
                        </div>
                        <div class="text-blue-500/80">
                            <i class="fa-solid fa-user-circle mr-1"></i>
                            ${first.operator}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function exportToExcel() {
            if (allFlights.length === 0) return dbAPI.showNotification("Немає даних для експорту", "warning");

            const sheetData = [
                ["ЖУРНАЛ обліку польотів із застосуванням БпЛА відділом повітряної розвідки та протидії безпілотним повітряним суднам"],
                [],
                ["№", "Дата", "Вид БпЛА", "Ділянка", "Час", "", "Тривалість польоту год., хв", "", "", "Підстава для польоту", "", "", "Висота польоту м.", "", "в/зв, ПІБ оператора", "", "Підпис", "Прим.", "Номер АКБ", "Цикли АКБ"],
                ["", "", "", "", "Зльоту", "Посадки", "год.", "хв.", "", "", "", "", "min", "max", "", "", "", "", "", ""]
            ];

            allFlights.forEach((f, i) => {
                const dateFormatted = f.date && f.date.includes('-') ? f.date.split('-').reverse().join('.') : f.date;
                const isNoFly = f.result === "Польоти не здійснювались";
                const durationTotal = isNoFly ? 0 : (parseInt(f.duration) || 0);
                const hh = Math.floor(durationTotal / 60);
                const mm = durationTotal % 60;

                sheetData.push([
                    i + 1, dateFormatted, f.drone, f.route || "Не вказано", fmtTime(f.takeoff), fmtTime(f.landing),
                    hh > 0 ? hh : "0", mm, "", "Патрулювання", "", "", "50", "150",
                    f.operator, "", "", f.result, f.battery_id || "", f.battery_cycles || ""
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(sheetData);

            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 19 } },
                { s: { r: 2, c: 0 }, e: { r: 3, c: 0 } },
                { s: { r: 2, c: 1 }, e: { r: 3, c: 1 } },
                { s: { r: 2, c: 2 }, e: { r: 3, c: 2 } },
                { s: { r: 2, c: 3 }, e: { r: 3, c: 3 } },
                { s: { r: 2, c: 4 }, e: { r: 2, c: 5 } },
                { s: { r: 2, c: 6 }, e: { r: 2, c: 8 } },
                { s: { r: 2, c: 9 }, e: { r: 2, c: 11 } },
                { s: { r: 2, c: 12 }, e: { r: 2, c: 13 } },
                { s: { r: 2, c: 14 }, e: { r: 3, c: 15 } },
                { s: { r: 2, c: 18 }, e: { r: 3, c: 18 } },
                { s: { r: 2, c: 19 }, e: { r: 3, c: 19 } }
            ];

            ws['!cols'] = [
                { wch: 4 }, { wch: 12 }, { wch: 40 }, { wch: 25 }, { wch: 10 }, { wch: 10 },
                { wch: 6 }, { wch: 6 }, { wch: 4 }, { wch: 20 }, { wch: 4 }, { wch: 4 },
                { wch: 8 }, { wch: 8 }, { wch: 25 }, { wch: 5 }, { wch: 10 }, { wch: 10 }, { wch: 15 }, { wch: 10 }
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "My_Flights");
            XLSX.writeFile(wb, `My_Journal_${currentOp}_${new Date().toLocaleDateString()}.xlsx`);
        }

        window.onload = loadFlights;
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW Registered:', reg.scope);
                }).catch(err => {
                    console.log('SW Registration Failed:', err);
                });
            });
        }
    </script>
</body>

</html>
