<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAV Workstation | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #060b18;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(34, 197, 94, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(59, 130, 246, 0.06) 0%, transparent 60%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            padding: 12px;
        }

        /* ── Glass Cards ── */
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .glass-inner {
            background: rgba(6, 11, 24, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0.75rem;
        }

        /* ── Labels ── */
        .label-style {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            display: flex;
            align-items: flex-end;
            min-height: 26px;
            letter-spacing: 0.06em;
            line-height: 1.2;
        }

        /* ── Inputs ── */
        input,
        select,
        textarea {
            background: rgba(6, 11, 24, 0.7) !important;
            color: #e2e8f0 !important;
            border: 1px solid rgba(100, 116, 139, 0.25) !important;
            border-radius: 0.625rem;
            font-size: 14px !important;
            width: 100%;
            padding: 10px 12px !important;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus,
        select:focus {
            border-color: rgba(34, 197, 94, 0.6) !important;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1), 0 0 20px rgba(34, 197, 94, 0.05);
        }

        select {
            cursor: pointer;
        }

        /* ── Buttons ── */
        .btn-primary {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.25);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(22, 163, 74, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-action {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .btn-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.3);
        }

        .btn-action:active {
            transform: translateY(0) scale(0.98);
        }

        /* ── Toolbar buttons ── */
        .toolbar-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.625rem;
            transition: all 0.2s ease;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .toolbar-btn:hover {
            transform: translateY(-1px);
        }

        .toolbar-btn:active {
            transform: translateY(0) scale(0.95);
        }

        /* ── CUS Boxes ── */
        .cus-box {
            background: rgba(6, 11, 24, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0.75rem;
            padding: 10px;
        }

        /* ── Draft Cards ── */
        .draft-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .draft-card:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(2px);
        }

        .draft-card.draft-empty-result {
            background: rgba(234, 179, 8, 0.1);
            border-color: rgba(234, 179, 8, 0.3);
        }

        .draft-card.draft-empty-result:hover {
            background: rgba(234, 179, 8, 0.15);
            border-color: rgba(234, 179, 8, 0.4);
        }

        /* ── Takeoff/Landing pills ── */
        .time-pill {
            background: rgba(6, 11, 24, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0.75rem;
            padding: 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .time-pill::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .time-pill.takeoff::after {
            background: linear-gradient(90deg, transparent, #22c55e, transparent);
        }

        .time-pill.landing::after {
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
        }

        /* ── Animations ── */
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .animate-pop {
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        /* ── Section Divider ── */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            margin: 12px 0;
        }

        /* ── Badge ── */
        .user-badge {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 0.5rem;
            padding: 6px 12px;
        }
    </style>
</head>

<body class="flex items-center justify-center">

    <!-- ═══ ANNOUNCEMENT MODAL ═══ -->
    <div id="announcementCard"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="glass w-full max-w-sm p-7 rounded-2xl border-l-4 border-yellow-500 shadow-2xl relative animate-pop">
            <div class="flex justify-between items-start mb-5">
                <h2 class="text-lg font-black text-yellow-500 uppercase tracking-wider flex items-center">
                    <i class="fa-solid fa-triangle-exclamation mr-2"></i>Увага
                </h2>
                <button onclick="closeAnnouncement()"
                    class="text-slate-500 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div id="announcementText"
                class="text-sm text-slate-200 leading-relaxed font-mono mb-6 whitespace-pre-wrap"></div>
            <button onclick="closeAnnouncement()"
                class="w-full bg-gradient-to-r from-yellow-600 to-amber-600 hover:from-yellow-500 hover:to-amber-500 text-black font-black uppercase py-3.5 rounded-xl transition-all shadow-lg active:scale-[0.97]">
                Зрозуміло
            </button>
        </div>
    </div>

    <!-- ═══ LOGIN SCREEN ═══ -->
    <div id="loginScreen" class="w-full max-w-md glass p-8 rounded-[2rem] hidden animate-fade">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-green-500/20 to-emerald-600/10 border border-green-500/20 mb-4">
                <i class="fa-solid fa-shield-halved text-2xl text-green-500"></i>
            </div>
            <h1
                class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500 uppercase tracking-tight">
                Авторизація
            </h1>
            <p class="text-xs text-slate-500 mt-2 font-medium">UAV Command System</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="label-style">Підрозділ</label>
                <select id="loginUnit" class=""></select>
            </div>
            <div>
                <label class="label-style">Прізвище</label>
                <input type="text" id="loginOp" class="" placeholder="Введіть прізвище">
            </div>
            <div>
                <label class="label-style">Пароль</label>
                <input type="password" id="loginPass" class="" placeholder="••••••••">
            </div>
            <button id="loginBtn" onclick="saveAuth()"
                class="w-full btn-primary py-4 rounded-xl text-white mt-2 text-sm">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>Увійти
            </button>
        </div>
    </div>

    <!-- ═══ MAIN SCREEN ═══ -->
    <div id="mainScreen" class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-5 hidden">

        <!-- ── LEFT PANEL: FORM ── -->
        <div class="lg:w-1/2 glass p-5 rounded-[1.5rem] h-fit animate-fade">

            <!-- Toolbar -->
            <div class="flex justify-between items-center mb-5">
                <div id="userBadge" class="user-badge text-[11px] font-bold text-green-400 tracking-wide"></div>
                <div class="flex flex-wrap gap-1.5 justify-end">
                    <button onclick="nav('/request')"
                        class="toolbar-btn bg-purple-500/10 text-purple-400 border-purple-500/20 hover:bg-purple-500/20"
                        title="Заявка"><i class="fa-solid fa-file-signature"></i></button>
                    <button onclick="nav('/dashboard')"
                        class="toolbar-btn bg-blue-500/10 text-blue-400 border-blue-500/20 hover:bg-blue-500/20"
                        title="Журнал"><i class="fa-solid fa-journal-whills"></i></button>
                    <button onclick="nav('/analytics')"
                        class="toolbar-btn bg-orange-500/10 text-orange-400 border-orange-500/20 hover:bg-orange-500/20"
                        title="Аналітика"><i class="fa-solid fa-chart-line"></i></button>
                    <button onclick="nav('/handbook')"
                        class="toolbar-btn bg-teal-500/10 text-teal-400 border-teal-500/20 hover:bg-teal-500/20"
                        title="Довідник"><i class="fa-solid fa-book-open"></i></button>
                    <button onclick="nav('/support')"
                        class="toolbar-btn bg-sky-500/10 text-sky-400 border-sky-500/20 hover:bg-sky-500/20"
                        title="Підтримка"><i class="fa-solid fa-headset"></i></button>
                    <button onclick="logout()"
                        class="toolbar-btn bg-red-500/10 text-red-400 border-red-500/20 hover:bg-red-500/20"
                        title="Вийти"><i class="fa-solid fa-power-off"></i></button>
                </div>
            </div>

            <form id="flightForm" class="space-y-3.5">
                <!-- Date & Shift -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-style">Дата</label>
                        <input type="date" id="date" class="" oninput="saveState(this.id)">
                    </div>
                    <div>
                        <label class="label-style">Час польотного завдання</label>
                        <div class="flex flex-wrap gap-1.5">
                            <input type="time" id="s1" value="08:00" class="text-center flex-1 min-w-[80px]"
                                oninput="saveState(this.id)">
                            <input type="time" id="s2" value="20:00" class="text-center flex-1 min-w-[80px]"
                                oninput="saveState(this.id)">
                        </div>
                    </div>
                </div>

                <!-- Drone -->
                <div>
                    <label class="label-style">БпЛА</label>
                    <select id="drone" class="text-green-400 font-semibold" onchange="saveState(this.id)">
                        <option>Завантаження...</option>
                    </select>
                </div>

                <!-- Route -->
                <div>
                    <label class="label-style">Маршрут</label>
                    <input type="text" id="route" class="" placeholder="Введіть маршрут..."
                        oninput="saveState(this.id)">
                </div>

                <!-- Takeoff / Landing -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="time-pill takeoff">
                        <label class="label-style text-green-400 flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-plane-departure text-[9px]"></i> Зліт
                        </label>
                        <input type="tel" id="t1" placeholder="09:30"
                            class="p-1.5 text-xl font-mono text-green-400 text-center !bg-transparent !border-none"
                            oninput="saveState(this.id)">
                    </div>
                    <div class="time-pill landing">
                        <label class="label-style text-red-400 flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-plane-arrival text-[9px]"></i> Посадка
                        </label>
                        <input type="tel" id="t2" placeholder="10:15"
                            class="p-1.5 text-xl font-mono text-red-400 text-center !bg-transparent !border-none"
                            oninput="saveState(this.id)">
                    </div>
                </div>

                <!-- Distance / Battery / Cycles -->
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="label-style">Дист. (м)</label>
                        <input type="number" id="dist" inputmode="numeric" class="" placeholder="0"
                            oninput="saveState(this.id)">
                    </div>
                    <div>
                        <label class="label-style">№ АКБ</label>
                        <input type="text" id="akb" class="" placeholder="—" oninput="saveState(this.id)">
                    </div>
                    <div>
                        <label class="label-style">Цикли</label>
                        <input type="number" id="cyc" inputmode="numeric" class="" placeholder="0"
                            oninput="saveState(this.id)">
                    </div>
                </div>

                <div class="section-divider"></div>

                <!-- Weather / Mode / Result -->
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="label-style">Погодні умови</label>
                        <select id="weather" class="text-xs" onchange="saveState(this.id)"></select>
                    </div>
                    <div>
                        <label class="label-style">Умови польоту</label>
                        <select id="mode" class="text-xs" onchange="saveState(this.id)"></select>
                    </div>
                    <div>
                        <label class="label-style text-orange-400">Результат</label>
                        <select id="result" class="text-xs text-orange-400 font-semibold"
                            onchange="saveState(this.id); toggleCommentField()"></select>
                    </div>
                </div>

                <div id="commentSection" class="hidden mt-3">
                    <label class="label-style text-slate-400">Коментар</label>
                    <textarea id="comment" class="text-xs h-16" placeholder="Вкажіть причину..."
                        oninput="saveState(this.id)"></textarea>
                </div>

                <!-- Photos -->
                <div class="glass-inner p-3.5">
                    <label class="label-style flex items-center gap-1.5 mb-2">
                        <i class="fa-solid fa-camera text-blue-400 text-[9px]"></i> Скріншоти / Фото
                    </label>
                    <input type="file" id="photos" multiple accept="image/*" class="text-[11px] text-slate-500">
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-2 pt-1">
                    <button type="button" id="submitBtn" onclick="addToDraft()"
                        class="w-full btn-action py-3.5 rounded-xl text-white text-sm">
                        <i class="fa-solid fa-plus mr-1.5"></i>Додати в чернетку
                    </button>
                    <button type="button" id="cancelBtn" onclick="cancelEdit()"
                        class="hidden w-1/3 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold uppercase text-xs transition-all text-slate-300 border border-slate-700">
                        Скасувати
                    </button>
                </div>
            </form>
        </div>

        <!-- ── RIGHT PANEL: DRAFT ── -->
        <div class="lg:w-1/2 glass p-5 rounded-[1.5rem] flex flex-col animate-fade" style="animation-delay: 0.1s;">

            <!-- Draft Header -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-clipboard-list text-blue-500"></i>
                    Чернетка
                    <span class="bg-blue-500/15 text-blue-400 px-2 py-0.5 rounded-md text-[10px] font-black"
                        id="draftCount">0</span>
                </h2>
            </div>

            <div id="draftList" class="flex-grow space-y-2 overflow-y-auto max-h-[250px] mb-4 pr-1"></div>

            <!-- CUS Blocks -->
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="cus-box">
                    <div class="flex justify-between items-center mb-2">
                        <span
                            class="text-[9px] font-black uppercase text-green-500/80 tracking-wide flex items-center gap-1">
                            <i class="fa-solid fa-sun text-[8px]"></i> До 00:00
                        </span>
                        <button onclick="copyText('cusBefore')"
                            class="text-[9px] text-blue-400 font-bold hover:text-blue-300 transition-colors">
                            <i class="fa-regular fa-copy mr-0.5"></i>Копіювати
                        </button>
                    </div>
                    <textarea id="cusBefore" readonly
                        class="w-full !bg-transparent p-1 text-[10px] h-16 text-slate-400 font-mono resize-none !border-none"></textarea>
                </div>
                <div class="cus-box">
                    <div class="flex justify-between items-center mb-2">
                        <span
                            class="text-[9px] font-black uppercase text-blue-500/80 tracking-wide flex items-center gap-1">
                            <i class="fa-solid fa-moon text-[8px]"></i> Після 00:00
                        </span>
                        <button onclick="copyText('cusAfter')"
                            class="text-[9px] text-blue-400 font-bold hover:text-blue-300 transition-colors">
                            <i class="fa-regular fa-copy mr-0.5"></i>Копіювати
                        </button>
                    </div>
                    <textarea id="cusAfter" readonly
                        class="w-full !bg-transparent p-1 text-[10px] h-16 text-slate-400 font-mono resize-none !border-none"></textarea>
                </div>
            </div>

            <!-- Publish Button -->
            <button id="publishBtn" onclick="publishAll()" disabled
                class="w-full btn-primary py-4 rounded-xl text-white mt-auto text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-paper-plane"></i>
                Опублікувати донесення
            </button>
        </div>
    </div>

    <script>
        const API = window.location.origin + "/api";
        let draft = [];
        let editingId = null;

        function normalizeOperatorName(name) {
            if (!name) return "";
            const ranks = [
                "солдат", "сержант", "лейтенант", "капітан", "майор", "підполковник", "полковник",
                "мл. с-нт", "ст. с-нт", "мл.", "ст.", "с-нт", "лт", "кпт", "м-р", "п-к", "ген",
                "рядовий", "старшина", "прапорщик"
            ];
            let res = name;
            ranks.forEach(rank => {
                const escapedRank = rank.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp("\\b" + escapedRank + "\\.?\\s*", "gi");
                res = res.replace(regex, "");
            });
            res = res.replace(/\b[А-ЯЁІЇЄA-Z]\.\s*/gi, "");
            res = res.replace(/\s+[А-ЯЁІЇЄA-Z](\.|$)/gi, "");
            res = res.trim().replace(/^[\s._,-]+|[\s._,-]+$/g, "");
            const words = res.split(/\s+/);
            if (words.length > 0 && words[0]) {
                res = words[0];
                res = res.charAt(0).toUpperCase() + res.slice(1).toLowerCase();
            }
            return res;
        }

        const loginOpInput = document.getElementById('loginOp');
        if (loginOpInput) {
            loginOpInput.addEventListener('blur', function () {
                this.value = normalizeOperatorName(this.value);
            });
        }

        function nav(path) {
            const token = new URLSearchParams(window.location.search).get('token');
            window.location.href = token ? `${path}?token=${token}` : path;
        }

        async function checkAnnouncement() {
            try {
                if (sessionStorage.getItem('announcement_seen')) return;
                const res = await fetch(API + "/get_announcement");
                if (!res.ok) return;

                const data = await res.json();
                if (data.is_announcement_active && data.announcement_text) {
                    document.getElementById('announcementText').innerText = data.announcement_text;
                    document.getElementById('announcementCard').classList.remove('hidden');
                }
            } catch (e) { console.error("Announcement error:", e); }
        }

        function closeAnnouncement() {
            document.getElementById('announcementCard').classList.add('hidden');
            sessionStorage.setItem('announcement_seen', 'true');
        }

        function saveState(id) {
            if (!editingId) {
                const el = document.getElementById(id);
                if (el) localStorage.setItem('saved_' + id, el.value);
            }
        }

        function restoreFields() {
            const ids = ['date', 's1', 's2', 'drone', 'route', 't1', 't2', 'dist', 'akb', 'cyc', 'weather', 'mode', 'result'];
            ids.forEach(id => {
                const val = localStorage.getItem('saved_' + id);
                const el = document.getElementById(id);
                if (val && el) el.value = val;
            });
            if (!document.getElementById('date').value) {
                document.getElementById('date').valueAsDate = new Date();
            }
            toggleCommentField();
        }

        function toggleCommentField() {
            const result = document.getElementById('result').value;
            const commentSection = document.getElementById('commentSection');
            if (result === "Польоти не здійснювались") {
                commentSection.classList.remove('hidden');
            } else {
                commentSection.classList.add('hidden');
                document.getElementById('comment').value = "";
                localStorage.removeItem('saved_comment');
            }
        }

        function formatTimeInput(val) {
            let clean = val.replace(/\D/g, '');
            if (clean.length === 3) clean = '0' + clean;
            if (clean.length === 4) {
                let h = clean.slice(0, 2), m = clean.slice(2, 4);
                if (parseInt(h) < 24 && parseInt(m) < 60) return h + ":" + m;
            }
            return val;
        }

        const timeIds = ['t1', 't2', 's1', 's2'];
        timeIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('blur', function () {
                this.value = formatTimeInput(this.value);
                saveState(id);
            });
        });

        window.onload = async function () {
            checkAnnouncement();

            const res = await fetch(API + "/get_options");
            const opt = await res.json();
            document.getElementById('loginUnit').innerHTML = opt.units.map(u => "<option>" + u + "</option>").join('');
            document.getElementById('weather').innerHTML = opt.weather.map(w => "<option>" + w + "</option>").join('');
            document.getElementById('mode').innerHTML = opt.flight_modes.map(m => "<option>" + m + "</option>").join('');
            document.getElementById('result').innerHTML = opt.results.map(r => "<option>" + r + "</option>").join('');

            restoreFields();

            const u = localStorage.getItem('uav_unit'), o = localStorage.getItem('uav_op');
            if (u && o) {
                document.getElementById('loginUnit').value = u;
                document.getElementById('loginOp').value = o;
                document.getElementById('userBadge').innerText = u + " | " + o;
                showMain(u);
            } else document.getElementById('loginScreen').classList.remove('hidden');

            const cached = localStorage.getItem('uav_draft_cache');
            if (cached) { draft = JSON.parse(cached); renderDraft(); }
        };

        async function showMain(unit) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');

            const resD = await fetch(API + "/get_unit_drones?unit=" + encodeURIComponent(unit));
            const allDrones = await resD.json();

            const activeDrones = allDrones.filter(d => !d.status || d.status === 'Active');

            document.getElementById('drone').innerHTML = activeDrones.map(d =>
                '<option value="' + d.model + ' (S/N: ' + d.serial_number + ')">' + d.model + ' [' + d.serial_number + ']</option>'
            ).join('');

            const savedDrone = localStorage.getItem('saved_drone');
            if (savedDrone) document.getElementById('drone').value = savedDrone;
        }

        async function saveAuth() {
            const unit = document.getElementById('loginUnit').value;
            const op = document.getElementById('loginOp').value;
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');

            if (!op || !pass) return alert("Введіть прізвище та пароль!");

            btn.disabled = true;
            btn.innerText = "ПЕРЕВІРКА...";

            try {
                const res = await fetch(API + "/check_auth", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ unit, operator: op, password: pass })
                });
                const data = await res.json();

                if (data.status === "ok") {
                    localStorage.setItem('uav_unit', unit);
                    localStorage.setItem('uav_op', normalizeOperatorName(op));
                    location.reload();
                } else {
                    alert(data.message || "Помилка авторизації");
                }
            } catch (e) {
                alert("Помилка з'єднання з сервером");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "Увійти";
            }
        }

        function editDraft(id) {
            const flight = draft.find(f => f.id === id);
            if (!flight) return;

            document.getElementById('date').value = flight.date.split('.').reverse().join('-');
            if (flight.shift_time) {
                const parts = flight.shift_time.split('-');
                if (parts.length === 2) {
                    document.getElementById('s1').value = parts[0];
                    document.getElementById('s2').value = parts[1];
                }
            }
            document.getElementById('drone').value = flight.drone;
            document.getElementById('route').value = flight.route;
            document.getElementById('t1').value = flight.takeoff;
            document.getElementById('t2').value = flight.landing;
            document.getElementById('dist').value = flight.distance;
            document.getElementById('akb').value = flight.battery_id;
            document.getElementById('cyc').value = flight.battery_cycles;
            document.getElementById('weather').value = flight.weather;
            document.getElementById('mode').value = flight.conditions;
            document.getElementById('result').value = flight.result;
            document.getElementById('comment').value = flight.comment || "";
            toggleCommentField();

            editingId = id;
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-check mr-1.5"></i>Зберегти зміни';
            btn.classList.remove('btn-action');
            btn.classList.add('bg-orange-500');

            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        function cancelEdit() {
            editingId = null;
            clearForm();
            restoreFields();

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-plus mr-1.5"></i>Додати в чернетку';
            btn.classList.add('btn-action');
            btn.classList.remove('bg-orange-500');
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function clearForm() {
            document.getElementById('t1').value = "";
            document.getElementById('t2').value = "";
            document.getElementById('dist').value = "";
            document.getElementById('akb').value = "";
            document.getElementById('cyc').value = "";
            document.getElementById('route').value = "";
            document.getElementById('comment').value = "";
            toggleCommentField();
        }

        function addToDraft() {
            const takeoffInput = document.getElementById('t1');
            const landingInput = document.getElementById('t2');

            if (!takeoffInput || !landingInput || !takeoffInput.value || !landingInput.value) {
                return alert("Спочатку вкажіть ЧАС зльоту та посадки!");
            }

            const getVal = (id, def) => {
                const el = document.getElementById(id);
                return el ? el.value : def;
            };

            let dateVal = getVal('date', '');
            if (dateVal.includes('-')) {
                dateVal = dateVal.split('-').reverse().join('.');
            } else if (!dateVal) {
                dateVal = new Date().toLocaleDateString('uk-UA');
            }

            const flightData = {
                id: editingId || Date.now(),
                date: dateVal,
                shift_time: (getVal('s1', '08:00') + "-" + getVal('s2', '20:00')),
                operator: localStorage.getItem('uav_op') || "Невідомий",
                unit: localStorage.getItem('uav_unit') || "Не вказано",
                drone: getVal('drone', 'БпЛА'),
                route: getVal('route', 'Патрулювання'),
                takeoff: takeoffInput.value,
                landing: landingInput.value,
                distance: getVal('dist', 0),
                battery_id: getVal('akb', '—'),
                battery_cycles: getVal('cyc', 0),
                weather: getVal('weather', 'Нормальні'),
                conditions: getVal('mode', 'Норма'),
                result: getVal('result', 'Без ознак порушення'),
                comment: document.getElementById('comment').value
            };

            const [h1, m1] = flightData.takeoff.split(':').map(Number);
            const [h2, m2] = flightData.landing.split(':').map(Number);
            let mStart = h1 * 60 + m1;
            let mEnd = h2 * 60 + m2;

            if (mEnd < mStart) { mEnd += 1440; }
            flightData.duration = mEnd - mStart;

            if (editingId) {
                const index = draft.findIndex(f => f.id === editingId);
                if (index !== -1) {
                    draft[index] = flightData;
                }
                cancelEdit();
            } else {
                draft.push(flightData);
                clearForm();
                localStorage.removeItem('saved_t1');
                localStorage.removeItem('saved_t2');
                localStorage.removeItem('saved_dist');
                localStorage.removeItem('saved_comment');
            }

            localStorage.setItem('uav_draft_cache', JSON.stringify(draft));
            renderDraft();
        }

        function renderDraft() {
            document.getElementById('draftCount').innerText = draft.length;
            document.getElementById('publishBtn').disabled = draft.length === 0;
            document.getElementById('draftList').innerHTML = draft.map(f => {
                const isEmpty = f.result === "Польоти не здійснювались";
                const highlightClass = isEmpty ? 'draft-empty-result' : '';
                const commentHtml = (isEmpty && f.comment) ? `<div class="text-[9px] text-yellow-500/80 italic mt-1 font-medium">📝 ${f.comment}</div>` : '';

                return `
                <div class="draft-card p-3 flex justify-between items-center ${highlightClass}">
                    <div class="text-[10px] w-full mr-2" onclick="editDraft(${f.id})" style="cursor: pointer;">
                        <div class="font-bold ${isEmpty ? 'text-yellow-500' : 'text-green-400'} flex items-center gap-2">
                            <i class="fa-solid ${isEmpty ? 'fa-circle-exclamation' : 'fa-plane'} text-[8px] opacity-50"></i>
                            ${f.takeoff} → ${f.landing} 
                            <span class="text-slate-500 font-normal text-[9px]">${f.duration} хв</span>
                        </div>
                        <div class="text-slate-500 uppercase truncate mt-0.5">${f.drone.split(' (')[0]}</div>
                        ${commentHtml}
                    </div>
                    <div class="flex items-center gap-0.5">
                        <button onclick="editDraft(${f.id})" class="text-yellow-500/70 p-2 hover:text-yellow-400 hover:bg-yellow-500/10 rounded-lg transition-all" title="Редагувати">
                            <i class="fa-solid fa-pen text-[11px]"></i>
                        </button>
                        <button onclick="removeFromDraft(${f.id})" class="text-red-500/70 p-2 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-all" title="Видалити">
                            <i class="fa-solid fa-trash-can text-[11px]"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
            generateCUS();
        }

        // --- ОНОВЛЕНА ФУНКЦІЯ ---
        function generateCUS() {
            let b = "", a = "";
            draft.forEach(f => {
                let line = f.takeoff + "-" + f.landing + " - " + f.distance + "м (" + f.duration + " хв)";
                if (f.result === "Польоти не здійснювались") {
                    line += " - Польоти не здійснювались";
                }
                line += "\n";

                if (f.landing < f.takeoff || f.takeoff < "08:00") {
                    a += line;
                } else {
                    b += line;
                }
            });
            document.getElementById('cusBefore').value = b || "---";
            document.getElementById('cusAfter').value = a || "---";
        }
        // ------------------------

        function removeFromDraft(id) {
            if (editingId === id) cancelEdit();
            draft = draft.filter(f => f.id !== id);
            localStorage.setItem('uav_draft_cache', JSON.stringify(draft));
            renderDraft();
        }

        function copyText(id) {
            const el = document.getElementById(id); if (el.value === "---") return;
            navigator.clipboard.writeText(el.value); alert("Скопійовано!");
        }

        async function publishAll() {
            if (draft.length === 0) return;
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>НАДСИЛАННЯ...';

            const first = draft[0];
            const currentShift = (document.getElementById('s1')?.value || "08:00") + "-" + (document.getElementById('s2')?.value || "20:00");
            const currentRoute = document.getElementById('route')?.value || "Не вказано";

            let report = "<b>Донесення:</b> " + first.unit + "\n" +
                "<b>Пілот:</b> " + first.operator + "\n" +
                "<b>Дата:</b> " + first.date + "\n" +
                "<b>Час завдання:</b> " + currentShift + "\n" +
                "<b>БпЛА:</b> " + first.drone + "\n" +
                "<b>Маршрут:</b> " + currentRoute + "\n" +
                "━━━━━━━━━━━━━━━\n" +
                "<b>Вильоти:</b>\n";

            draft.forEach((f, i) => {
                report += (i + 1) + ". " + f.takeoff + "-" + f.landing + " (" + f.duration + " хв)\n";
                let statusParts = [];
                if (f.weather && f.weather !== "Нормальні") statusParts.push("☁️ " + f.weather);
                if (f.conditions && f.conditions !== "Норма") statusParts.push("⚠️ " + f.conditions);
                if (f.result && f.result !== "Без ознак порушення") statusParts.push("🎯 <b>" + f.result + "</b>");
                if (f.result === "Польоти не здійснювались" && f.comment) statusParts.push("💬 " + f.comment);
                if (statusParts.length > 0) report += "   └ " + statusParts.join(" | ") + "\n";
            });

            try {
                for (const f of draft) {
                    let dbDate;
                    if (f.date && f.date.includes('.')) {
                        let [d, m, y] = f.date.split('.');
                        dbDate = `${y}-${m}-${d}`;
                    } else {
                        dbDate = f.date || new Date().toISOString().split('T')[0];
                    }

                    const toDb = {
                        ...f,
                        date: dbDate,
                        duration: Math.floor(Number(f.duration)) || 0,
                        distance: Math.floor(Number(f.distance)) || 0,
                        battery_cycles: Math.floor(Number(f.battery_cycles)) || 0
                    };
                    delete toDb.id;

                    await fetch(API + "/add_flight", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(toDb)
                    });
                }

                const fd = new FormData();
                fd.append('report_text', report);
                const ph = document.getElementById('photos');
                if (ph && ph.files.length > 0) {
                    Array.from(ph.files).forEach(file => fd.append('images', file));
                }

                const resT = await fetch(API + "/publish_with_telegram", { method: 'POST', body: fd });
                if ((await resT.json()).status === "ok") {
                    alert("Успішно опубліковано!");
                    draft = [];
                    localStorage.removeItem('uav_draft_cache');
                    Object.keys(localStorage).forEach(key => {
                        if (key.startsWith('saved_')) localStorage.removeItem(key);
                    });
                    location.reload();
                }
            } catch (e) {
                alert("Помилка при відправці!");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i>Опублікувати донесення';
            }
        }

        function logout() { if (confirm("Вийти?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>

</html>
