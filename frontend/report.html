<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAV System | Генератор Звітів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-premium {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 0.75rem;
            padding: 0.625rem 1rem;
            width: 100%;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.875rem;
        }

        .input-premium:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        .label-premium {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-premium {
            background: var(--primary);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-premium:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .btn-premium:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.8);
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 1rem;
            height: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .photo-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 0.75rem;
            border: 2px solid var(--primary);
            transition: transform 0.2s;
        }

        .photo-preview:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h1
                    class="text-4xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase">
                    Звітність
                </h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1 opacity-70">
                    Автоматизоване бойове донесення
                </p>
            </div>
            <button onclick="nav('/')" class="glass-card p-3 text-slate-400 hover:text-white transition-colors group">
                <i class="fa-solid fa-house group-hover:scale-110 transition-transform"></i>
            </button>
        </header>

        <!-- Search Section -->
        <section class="glass-card p-6 mb-8">
            <h3 class="text-xs font-black uppercase text-blue-400 mb-6 flex items-center tracking-widest">
                <i class="fa-solid fa-magnifying-glass mr-2"></i> Джерело даних
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="label-premium">Виберіть дату</label>
                    <input type="date" id="searchDate" class="input-premium">
                </div>
                <div>
                    <label class="label-premium">Виберіть підрозділ</label>
                    <select id="searchUnit" class="input-premium" onchange="generateReport()">
                        <option value="">Завантаження...</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="loadInitData(true)" class="btn-premium w-full shadow-emerald-500/20">
                        <i class="fa-solid fa-rotate"></i> Оновити дані
                    </button>
                </div>
            </div>
        </section>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Side: Config -->
            <div class="glass-card p-6 space-y-6">
                <div class="flex justify-between items-center border-b border-white/10 pb-4">
                    <h3 class="text-sm font-black uppercase text-slate-300 tracking-wider">Параметри звіту</h3>
                    <div id="saveStatus"
                        class="flex items-center gap-1.5 text-[10px] text-emerald-400 uppercase font-bold opacity-0 transition-opacity">
                        <i class="fa-solid fa-check-circle"></i> Збережено
                    </div>
                </div>

                <div>
                    <label class="label-premium">Шапка донесення</label>
                    <textarea id="reportHeader" rows="3" class="input-premium !min-h-[100px] font-medium"
                        oninput="triggerSave(); generateReport()" placeholder="Кому дописуємо звіт..."></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="label-premium">Дата у форматі звіту</label>
                        <input type="text" id="reportDate" oninput="triggerSave(); generateReport()"
                            placeholder="12.02.2026" class="input-premium">
                    </div>
                    <div>
                        <label class="label-premium">Маршрут польотів</label>
                        <input type="text" id="reportRoute" oninput="triggerSave(); generateReport()"
                            placeholder="н.п. Альфа - н.п. Бета" class="input-premium">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="label-premium">Командир екіпажу (Посада, ПІБ)</label>
                        <input type="text" id="reportCmd" oninput="triggerSave(); generateReport()"
                            class="input-premium">
                    </div>
                    <div>
                        <label class="label-premium">Оператори (Звання, ПІБ)</label>
                        <input type="text" id="reportOps" oninput="triggerSave(); generateReport()"
                            class="input-premium">
                    </div>
                </div>

                <div class="pt-4 border-t border-white/5">
                    <label class="label-premium text-sky-400 flex items-center">
                        <i class="fa-solid fa-cloud-sun mr-2"></i> Метеоумови
                    </label>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-3">
                        <div>
                            <label class="label-mini text-[9px] uppercase font-bold text-slate-500 mb-1 block">Темп.
                                °С</label>
                            <input type="text" id="weatherTemp" placeholder="+10"
                                oninput="triggerSave(); generateReport()" class="input-premium text-center">
                        </div>
                        <div>
                            <label class="label-mini text-[9px] uppercase font-bold text-slate-500 mb-1 block">Вид.
                                км</label>
                            <input type="text" id="weatherVis" placeholder="10"
                                oninput="triggerSave(); generateReport()" class="input-premium text-center">
                        </div>
                        <div>
                            <label class="label-mini text-[9px] uppercase font-bold text-slate-500 mb-1 block">Напр.
                                º</label>
                            <input type="number" id="weatherWindDir" placeholder="180"
                                oninput="triggerSave(); generateReport()" class="input-premium text-center">
                        </div>
                        <div>
                            <label class="label-mini text-[9px] uppercase font-bold text-slate-500 mb-1 block">Швидк.
                                м/с</label>
                            <input type="number" id="weatherWindSpeed" placeholder="3"
                                oninput="triggerSave(); generateReport()" class="input-premium text-center">
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-white/5">
                    <label class="label-premium text-yellow-500">Результат виконання</label>
                    <select id="resultType" class="input-premium mt-1" onchange="toggleResultInput(); generateReport()">
                        <option value="none">Порушень не виявлено</option>
                        <option value="detained">Затримано правопорушників</option>
                    </select>
                    <div id="detainedCountWrapper" class="hidden mt-4 animate-fadeIn">
                        <label class="label-premium">Кількість осіб</label>
                        <input type="number" id="detainedCount" min="1" value="1" class="input-premium"
                            oninput="generateReport()">
                    </div>
                </div>

                <div class="pt-4 border-t border-white/5">
                    <label class="label-premium text-blue-400 flex items-center"><i class="fa-solid fa-camera mr-2"></i>
                        Фотоматеріали</label>
                    <div class="flex items-center gap-4 mt-2">
                        <label
                            class="cursor-pointer bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 py-3 px-6 rounded-xl border border-blue-500/30 transition-all flex-grow text-center text-xs font-bold uppercase tracking-widest">
                            <i class="fa-solid fa-upload mr-2"></i> Вибрати фото
                            <input type="file" id="reportImages" multiple accept="image/*" class="hidden"
                                onchange="previewImages()">
                        </label>
                    </div>
                    <div id="imagePreviewContainer" class="flex gap-4 flex-wrap mt-6"></div>
                </div>
            </div>

            <!-- Right Side: Preview -->
            <div class="glass-card p-6 flex flex-col min-h-[600px]">
                <div class="flex flex-wrap justify-between items-center mb-6 gap-4 border-b border-white/10 pb-4">
                    <h3 class="text-sm font-black uppercase text-slate-300 tracking-wider">Попередній перегляд</h3>
                    <div class="flex gap-2">
                        <button onclick="copyReport()" class="btn-premium btn-secondary !p-3 shadow-none"
                            title="Копіювати текст">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button onclick="downloadWord()" id="btnDownload" class="btn-premium shadow-emerald-500/30">
                            <i class="fa-solid fa-file-word"></i>
                            <span id="btnDownloadText">Скачати DOCX</span>
                        </button>
                    </div>
                </div>
                <textarea id="finalReport"
                    class="input-premium flex-grow !bg-transparent !border-none !shadow-none resize-none leading-relaxed text-sm scrollbar-thin overflow-y-auto"
                    readonly></textarea>

                <div
                    class="mt-6 flex justify-between items-center text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                    <span>Система UAV Command</span>
                    <button onclick="downloadTestDoc()" class="hover:text-blue-400 transition-colors">Тестування
                        сервера</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/libs/db.js"></script>
    <script>
        let allFlights = [];
        let saveTimeout;

        // Strip seconds from time: "12:30:00" → "12:30"
        function fmtTime(t) { return t ? t.substring(0, 5) : '--'; }

        function nav(path) {
            const token = new URLSearchParams(window.location.search).get('token');
            window.location.href = token ? `${path}?token=${token}` : path;
        }

        function triggerSave() {
            clearTimeout(saveTimeout);
            const status = document.getElementById('saveStatus');
            status.style.opacity = '1';
            saveTimeout = setTimeout(() => {
                saveLocal();
                setTimeout(() => { status.style.opacity = '0'; }, 1000);
            }, 500);
        }

        async function loadInitData(isRefresh = false) {
            console.log("loadInitData: Starting...");
            if (!isRefresh) loadLocal();

            const unitSelect = document.getElementById('searchUnit');
            unitSelect.innerHTML = '<option value="">Синхронізація...</option>';

            // 1. Try Load from local DB first
            const cachedMeta = await dbAPI.getMeta();
            if (cachedMeta) applyOptions(cachedMeta);

            try {
                const [resOpt, resFlights] = await Promise.all([
                    fetch("/api/get_options"),
                    fetch("/api/get_all_flights")
                ]);

                if (!resOpt.ok || !resFlights.ok) throw new Error("API Connection Error");

                const options = await resOpt.json();
                allFlights = await resFlights.json();

                applyOptions(options);
                dbAPI.saveMeta(options);
                dbAPI.saveDrafts(allFlights); // Reuse drafts store for all flights in report context? 
                // Actually maybe a separate store for all_flights? I'll just use a local variable for now as it's large.

                // Auto-fill from URL
                const params = new URLSearchParams(window.location.search);
                const pDate = params.get('date');
                const pUnit = params.get('unit');
                const pRoute = params.get('route');

                if (pDate) document.getElementById('searchDate').value = pDate;
                else if (!document.getElementById('searchDate').value) document.getElementById('searchDate').valueAsDate = new Date();

                if (pUnit) unitSelect.value = pUnit;
                if (pRoute) document.getElementById('reportRoute').value = pRoute;

                generateReport();
                console.log("loadInitData: Success");
            } catch (e) {
                console.error("Initialization Failed:", e);
                if (!cachedMeta) alert("Помилка підключення до сервера та відсутній кеш: " + e.message);
            }
        }

        function applyOptions(options) {
            const unitSelect = document.getElementById('searchUnit');
            unitSelect.innerHTML = '<option value="">Оберіть підрозділ...</option>';
            options.units.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u; opt.text = u;
                unitSelect.appendChild(opt);
            });
        }

        function generateReport() {
            const date = document.getElementById('searchDate').value;
            const unit = document.getElementById('searchUnit').value;
            const route = document.getElementById('reportRoute').value || "...";
            const cmd = document.getElementById('reportCmd').value || "...";
            const ops = document.getElementById('reportOps').value || "...";
            const header = document.getElementById('reportHeader').value;

            const rDate = document.getElementById('reportDate').value || (date ? date.split('-').reverse().join('.') : "___");

            // Filter
            const filtered = allFlights.filter(f => f.date === date && f.unit === unit && f.result !== "Польоти не здійснювались");

            let flightsBlock = "";
            const uniqueDrones = new Set();
            const stats = {};

            filtered.forEach(f => {
                const op = f.operator || "Невідомий";
                const dr = f.drone || "БпЛА";
                uniqueDrones.add(dr);

                if (!stats[op]) stats[op] = { count: 0, drones: {} };
                stats[op].count++;
                if (!stats[op].drones[dr]) stats[op].drones[dr] = [];
                stats[op].drones[dr].push(`${fmtTime(f.takeoff)} - ${fmtTime(f.landing)} (${f.distance || 0} м)`);
            });

            Object.entries(stats).forEach(([op, data]) => {
                flightsBlock += `${op} — ${data.count} польотів\n`;
                Object.entries(data.drones).forEach(([drone, times]) => {
                    flightsBlock += `${drone}\n${times.join('\n')}\n`;
                });
                flightsBlock += "\n";
            });

            if (!flightsBlock) flightsBlock = "Польоти за вказаний період відсутні.\n\n";

            const temp = document.getElementById('weatherTemp').value || "0";
            const vis = document.getElementById('weatherVis').value || "0";
            const wDir = document.getElementById('weatherWindDir').value || "0";
            const wSpd = document.getElementById('weatherWindSpeed').value || "0";
            const weather = `температура ${temp}°С, видимість ${vis} км, хмарність 2-3 бали, вітер ${wDir}º / ${wSpd} м/с, небезпечних явищ не виявлено.`;

            const resType = document.getElementById('resultType').value;
            const resultMsg = resType === 'detained'
                ? `Виявлено та затримано ${document.getElementById('detainedCount').value || 1} правопорушників.`
                : "Порушень ОПДК не виявлено.";

            const dronesList = Array.from(uniqueDrones).join(', ') || "____";

            const template = `${header}\n\nДОНЕСЕННЯ ПРО ПОЛІТ\n\nДата: ${rDate}\nДілянка: ${unit || '___'}\n\n${flightsBlock}Маршрут: ${route}\nБпАК: ${dronesList}\n\nСклад екіпажу:\nКомандир: ${cmd}\nОператори: ${ops}\n\nРезультати:\n${resultMsg}\n\nМетеоумови: ${weather}\n\nСтан техніки: БпАК справний, відмов не зафіксовано.\n\nКомандир зовнішнього екіпажу:\n${cmd}`;

            document.getElementById('finalReport').value = template;
        }

        async function downloadWord() {
            const btn = document.getElementById('btnDownload');
            const unit = document.getElementById('searchUnit').value || "ЗВІТ";
            const date = document.getElementById('searchDate').value || "ДАТА";
            const route = document.getElementById('reportRoute').value || "...";
            const cmd = document.getElementById('reportCmd').value || "...";
            const ops = document.getElementById('reportOps').value || "...";
            const header = document.getElementById('reportHeader').value;
            const rDate = document.getElementById('reportDate').value || (date ? date.split('-').reverse().join('.') : "___");

            // Збирання даних польотів для таблиці
            const filtered = allFlights.filter(f => f.date === date && f.unit === unit && f.result !== "Польоти не здійснювались");
            const stats = {};
            const uniqueDrones = new Set();

            filtered.forEach(f => {
                const op = f.operator || "Невідомий";
                const dr = f.drone || "БпЛА";
                uniqueDrones.add(dr);

                // Create a unique key for operator + drone combi
                const key = `${op}_${dr}`;
                if (!stats[key]) {
                    stats[key] = { name: op, drone: dr, count: 0, details: [] };
                }
                stats[key].count++;
                stats[key].details.push(`${fmtTime(f.takeoff)} - ${fmtTime(f.landing)} (${f.distance || 0} м)`);
            });

            const flightsData = Object.values(stats).map(item => ({
                operator: item.name,
                drone: item.drone,
                count: parseInt(item.count) || 0,
                details: item.details.join("; ")
            }));

            // Погода
            const temp = document.getElementById('weatherTemp').value || "0";
            const vis = document.getElementById('weatherVis').value || "0";
            const wDir = document.getElementById('weatherWindDir').value || "0";
            const wSpd = document.getElementById('weatherWindSpeed').value || "0";
            const weather = `температура повітря ${temp > 0 ? '+' + temp : temp}°C, польотна видимість ${vis} км, хмарність 2-3 бали вище висоти польоту, вітер ${wDir}º / ${wSpd} м/с, небезпечних явищ погоди не спостерігалось`;

            // Результати
            const resType = document.getElementById('resultType').value;
            const resultMsg = resType === 'detained'
                ? `Виявлено та затримано ${document.getElementById('detainedCount').value || 1} правопорушників.`
                : "Під час польотів порушень ОПДК не виявлено.";

            // Об'єкт для бекенду
            const dronesList = Array.from(uniqueDrones).join(', ') || "____";

            // Отримання фотографії (Base64)
            let photoBase64 = null;
            const previewImages = document.querySelectorAll('#imagePreviewContainer img');
            if (previewImages.length > 0) {
                photoBase64 = previewImages[0].src;
            }

            // Короткий формат командира
            const cmdParts = cmd.split(' ');
            const rank = cmdParts[0] || 'штаб-сержант';
            const name = cmdParts.slice(1).join(' ') || 'Степан БАНДЕРА';
            const commanderShort = `${rank}                                          ${name}`;

            const reportData = {
                header: header,
                title: "ДОНЕСЕННЯ ПРО ПОЛІТ",
                date: rDate,
                unit: unit,
                flights: flightsData,
                result: resultMsg,
                weather: weather,
                commander: cmd,
                route: route,
                operators: ops,
                drones_list: dronesList,
                commander_short: commanderShort,
                photo: photoBase64
            };

            const fileName = (`${unit}_${date}`).replace(/[\/\\?%*:|"<>]/g, '-') + ".docx";

            if (!navigator.onLine) {
                await dbAPI.addToSyncQueue('report', { reportData, fileName });
                alert("Офлайн режим: дані звіту збережено. Коли з'явиться інтернет, звіт буде автоматично згенеровано та підготовлено до завантаження.");
                return;
            }

            btn.innerHTML = '<div class="spinner"></div> Форматування...';

            setTimeout(() => {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/api/generate_docx';
                form.target = '_blank';
                form.style.display = 'none';

                const dataInput = document.createElement('input');
                dataInput.type = 'hidden';
                dataInput.name = 'report_data';
                dataInput.value = JSON.stringify(reportData);
                form.appendChild(dataInput);

                const fileInput = document.createElement('input');
                fileInput.type = 'hidden';
                fileInput.name = 'filename';
                fileInput.value = fileName;
                form.appendChild(fileInput);

                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);

                btn.innerHTML = '<i class="fa-solid fa-file-word"></i> Скачати DOCX';
            }, 500);
        }

        async function syncOfflineData() {
            if (!navigator.onLine) return;
            const queue = await dbAPI.getSyncQueue();
            if (queue.length === 0) return;
            // For now, we just notify. Background download is tricky.
        }
        window.addEventListener('online', syncOfflineData);

        function downloadTestDoc() {
            const text = "ТЕСТОВИЙ ДОКУМЕНТ\nУкраїнська мова працює!\nUTF-8 Check: Привіт Світ!";

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/api/generate_docx';
            form.style.display = 'none';

            const textInput = document.createElement('input');
            textInput.type = 'hidden';
            textInput.name = 'text';
            textInput.value = text;
            form.appendChild(textInput);

            const fileInput = document.createElement('input');
            fileInput.type = 'hidden';
            fileInput.name = 'filename';
            fileInput.value = "ТЕСТ_УСПІХ.docx";
            form.appendChild(fileInput);

            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        function toggleResultInput() {
            const wrap = document.getElementById('detainedCountWrapper');
            wrap.classList.toggle('hidden', document.getElementById('resultType').value !== 'detained');
        }

        function previewImages() {
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';
            Array.from(document.getElementById('reportImages').files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'photo-preview';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function copyReport() {
            const t = document.getElementById('finalReport');
            t.select();
            navigator.clipboard.writeText(t.value).then(() => {
                const btn = document.querySelector('[onclick="copyReport()"]');
                const oldHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.classList.add('!bg-emerald-600');
                setTimeout(() => {
                    btn.innerHTML = oldHtml;
                    btn.classList.remove('!bg-emerald-600');
                }, 1500);
            });
        }

        function saveLocal() {
            const fields = ['reportHeader', 'reportDate', 'reportRoute', 'reportCmd', 'reportOps', 'weatherTemp', 'weatherVis', 'weatherWindDir', 'weatherWindSpeed'];
            fields.forEach(f => localStorage.setItem(f, document.getElementById(f).value));
        }

        function loadLocal() {
            ['reportHeader', 'reportDate', 'reportRoute', 'reportCmd', 'reportOps', 'weatherTemp', 'weatherVis', 'weatherWindDir', 'weatherWindSpeed'].forEach(f => {
                const val = localStorage.getItem(f);
                if (val) document.getElementById(f).value = val;
            });
            if (!document.getElementById('reportHeader').value) {
                document.getElementById('reportHeader').value = "Начальнику відділу організації\nповітряної розвідки та протидії безпілотним\nповітряним суднам штабу\nпідполковнику   Армену МКРТЧЯН";
            }
        }

        window.onload = () => loadInitData();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW Registered:', reg.scope);
                }).catch(err => {
                    console.log('SW Registration Failed:', err);
                });
            });
        }
    </script>
</body>
