<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Офлайн | UAV Pilot Cabinet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #060b18;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 2rem;
        }
    </style>
</head>

<body>
    <div class="glass max-w-sm mx-4">
        <img src="/icon.png" alt="Logo" class="w-24 h-24 mx-auto mb-6 rounded-2xl shadow-2xl">
        <h1 class="text-2xl font-black uppercase tracking-tighter mb-2">Офлайн режим</h1>
        <p class="text-slate-400 text-sm mb-8">Сторінка не завантажена, оскільки ви не підключені до мережі. Спробуйте
            оновити пізніше або перейдіть на головну.</p>

        <div class="flex flex-col gap-3">
            <button onclick="window.location.reload()"
                class="bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-widest py-3 rounded-xl transition-all active:scale-95">
                <i class="fa-solid fa-rotate-right mr-2"></i> Оновити
            </button>
            <a href="/"
                class="text-slate-500 hover:text-white text-xs font-black uppercase tracking-widest transition-all">
                Повернутись на головну
            </a>
        </div>
    </div>
</body>

</html>
